<!DOCTYPE html>
<html lang="el">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1200" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#fbbf24" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Hotel Madness" />
    <link rel="apple-touch-icon" href="/icon.svg" />

    <!-- SEO / Social -->
    <meta name="description" content="Βίωσε τη δράση ενός ξενοδοχείου στην Ελλάδα! RPG επιλογών με AI-driven σεναρίου. Επίλεξε ρόλο και επιβίωσε από τον Μουστάκα!" />
    <meta property="og:title" content="Hotel Madness: Greek Management RPG" />
    <meta property="og:description" content="Επίλεξε ρόλο, διαχειρίσου κρίσεις και επιβίωσε από τον Μουστάκα στο πιο χαοτικό ξενοδοχείο της Ελλάδας." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://hotel-madness.vercel.app" />

    <title>Hotel Madness: Greek Management RPG</title>
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!-- Register Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('[PWA] Service Worker registered:', reg.scope))
            .catch(err => console.warn('[PWA] Service Worker failed:', err));
        });
      }
    </script>
  </body>
</html>
